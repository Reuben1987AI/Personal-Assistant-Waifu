<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kassandra</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <div id="status-indicator" class="status idle"></div>
    <div id="status-text">Say "Kassandra" to start</div>
    <div id="transcript"></div>
    <div id="controls">
      <button id="trigger-btn">Trigger Wake</button>
      <button id="mute-btn" class="hidden">Mute</button>
      <button id="end-btn" class="hidden">End Call</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
