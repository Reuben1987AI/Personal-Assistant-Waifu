<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kassandra</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header id="status-bar">
      <div id="status-indicator" class="status idle"></div>
      <div id="status-text">Click Call to start</div>
    </header>
    <main id="chat">
      <div id="wake-hero" data-state="listening">
        <div id="wake-circle">
          <div id="wake-bars"></div>
        </div>
        <div id="wake-label"></div>
        <div id="wake-score"></div>
      </div>
      <div id="messages"></div>
    </main>
    <footer id="controls">
      <button id="call-btn">Call</button>
      <button id="mute-btn" class="hidden">Mute</button>
      <button id="end-btn" class="hidden">End Call</button>
    </footer>
  </div>
  <script src="main.js"></script>
</body>
</html>
